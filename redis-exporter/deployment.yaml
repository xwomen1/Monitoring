# Redis trên 192.168.5.40:6379 (không auth). Nếu có password: thêm env REDIS_PASSWORD từ secret.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: logging
  labels:
    app: redis-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter
  template:
    metadata:
      labels:
        app: redis-exporter
    spec:
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.54.0
          args:
            - --redis.addr=192.168.5.40:6379
          ports:
            - containerPort: 9121
              name: metrics
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
