apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: logging
  labels:
    app: promtail
data:
  config.yaml: |
    server:
      http_listen_port: 9080

    clients:
      - url: http://loki.logging.svc.cluster.local:3100/loki/api/v1/push

    positions:
      filename: /tmp/positions.yaml

    scrape_configs:
      - job_name: kubernetes-pods-direct
        static_configs:
          - targets:
              - localhost
            labels:
              job: kubernetes-pods
              __path__: /var/log/pods/*/*/*.log

        pipeline_stages:
          - cri: {}
          - regex:
              expression: "/var/log/pods/(?P<project>[^_]+)_(?P<pod_full_name>[^_]+)_(?P<pod_uid>[^/]+)/.+"
              source: filename
          - regex:
              expression: "(?P<app_clean>.*)-[a-z0-9]+-[a-z0-9]+"
              source: pod_full_name
          - template:
              source: app
              template: '{{ if .app_clean }}{{ .app_clean }}{{ else }}{{ .pod_full_name }}{{ end }}'
          - labels:
              project:
              app:
