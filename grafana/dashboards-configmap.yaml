apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-json
  namespace: logging
  labels:
    app: grafana
data:
  monitoring-overview.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
