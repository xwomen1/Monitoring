          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "rate(mssql_batch_requests[5m])", "legendFormat": "MSSQL", "refId": "A"}],
          "title": "SQL Server batch requests/s",
          "type": "timeseries"
        }
