          "gridPos": {"h": 6, "w": 12, "x": 12, "y": 5},
          "id": 106,
          "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}},
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "(1 - (node_memory_MemAvailable_bytes{job=\"node-exporter\"} / node_memory_MemTotal_bytes{job=\"node-exporter\"})) * 100", "legendFormat": "{{instance}}", "refId": "A"}],
          "title": "Node memory %",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "mappings": [], "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}, "unit": "short"}, "overrides": []},
          "gridPos": {"h": 6, "w": 8, "x": 0, "y": 11},
          "id": 107,
          "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}},
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "mysql_global_status_threads_connected", "legendFormat": "MySQL", "refId": "A"}],
          "title": "MySQL connections",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "mappings": [], "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}, "unit": "short"}, "overrides": []},
          "gridPos": {"h": 6, "w": 8, "x": 8, "y": 11},
          "id": 108,
          "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}},
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "redis_connected_clients", "legendFormat": "Redis", "refId": "A"}],
          "title": "Redis connected clients",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "mappings": [], "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}, "unit": "bytes"}, "overrides": []},
          "gridPos": {"h": 6, "w": 8, "x": 16, "y": 11},
          "id": 109,
          "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}},
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "redis_memory_used_bytes", "legendFormat": "Redis", "refId": "A"}],
          "title": "Redis memory used",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "mappings": [], "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}, "unit": "short"}, "overrides": []},
