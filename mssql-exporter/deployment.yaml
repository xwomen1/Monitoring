apiVersion: apps/v1
kind: Deployment
metadata:
  name: mssql-exporter
  namespace: logging
  labels:
    app: mssql-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mssql-exporter
  template:
    metadata:
      labels:
        app: mssql-exporter
    spec:
      containers:
        - name: mssql-exporter
          image: awaragi/prometheus-mssql-exporter:latest
          env:
            - name: SERVER
              value: "<YOUR_MSSQL_IP>"
            - name: PORT
              value: "1433"
            - name: USERNAME
              valueFrom:
                secretKeyRef:
                  name: mssql-exporter-auth
                  key: USERNAME
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mssql-exporter-auth
                  key: PASSWORD
          ports:
            - containerPort: 4000
              name: metrics
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
